<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mockup Generator — Sponsor Leghe Fantacalcio</title>
<style>
:root{color-scheme:light}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:#f4f5f7;color:#172b4d}
header{background:#0b1f3a;color:#fff;padding:16px 22px}
header h1{margin:0;font-size:18px}
header p{margin:4px 0 0;font-size:12.5px;opacity:.8}
.wrap{display:flex;gap:18px;padding:18px;max-width:1200px;margin:0 auto;align-items:flex-start}
.side{width:300px;flex:none}
.side input[type=search]{width:100%;padding:8px 10px;border:1px solid #c1c7d0;border-radius:8px;font-size:14px;margin-bottom:10px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-height:70vh;overflow:auto}
.card{border:1px solid #dfe1e6;border-radius:8px;background:#fff;cursor:pointer;padding:6px;text-align:center;font-size:11px;color:#42526e}
.card:hover{border-color:#0052cc}
.card.sel{border-color:#0052cc;box-shadow:0 0 0 2px #0052cc33}
.card .thumbwrap{background-image:linear-gradient(45deg,#eee 25%,transparent 25%),linear-gradient(-45deg,#eee 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#eee 75%),linear-gradient(-45deg,transparent 75%,#eee 75%);background-size:14px 14px;background-position:0 0,0 7px,7px -7px,-7px 0;border-radius:5px;height:120px;display:flex;align-items:center;justify-content:center;overflow:hidden;margin-bottom:4px}
.card img{max-width:100%;max-height:118px;object-fit:contain}
.main{flex:1;background:#fff;border:1px solid #dfe1e6;border-radius:10px;padding:18px;min-height:300px}
.main h2{margin:0 0 6px;font-size:16px}
.meta{font-size:13px;color:#6b778c;margin-bottom:12px}
.meta b{color:#172b4d}
.controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.btn{padding:9px 14px;border-radius:8px;border:1px solid #c1c7d0;background:#fff;cursor:pointer;font-size:14px}
.btn.primary{background:#0052cc;color:#fff;border-color:#0052cc}
.btn:disabled{opacity:.5;cursor:not-allowed}
.stage{background-image:linear-gradient(45deg,#eee 25%,transparent 25%),linear-gradient(-45deg,#eee 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#eee 75%),linear-gradient(-45deg,transparent 75%,#eee 75%);background-size:20px 20px;background-position:0 0,0 10px,10px -10px,-10px 0;border:1px solid #dfe1e6;border-radius:8px;padding:10px;text-align:center}
.stage canvas{max-width:100%;height:auto;box-shadow:0 1px 6px #0003}
.empty{color:#97a0af;padding:40px;text-align:center}
.hint{font-size:12px;color:#6b778c;margin-top:10px}
code{background:#eef;padding:1px 5px;border-radius:4px}
</style>
</head>
<body>
<header>
<h1>Mockup Generator — Sponsor Leghe Fantacalcio</h1>
<p>Scegli un template, carica l'immagine sponsor (dimensioni esatte del PSD) e scarica il mockup finito. Tutto nel browser, nessun caricamento su server.</p>
</header>
<div class="wrap">
  <div class="side">
    <input type="search" id="q" placeholder="Cerca template…">
    <div class="grid" id="grid"></div>
  </div>
  <div class="main" id="main">
    <div class="empty">Seleziona un template dall'elenco a sinistra.</div>
  </div>
</div>
<script>
const GREEN='templates/green/', LAYER0='templates/layer0/';
let TPL=[], sel=null, sponsorImg=null;
const main=document.getElementById('main');

function loadImg(src){return new Promise((res,rej)=>{const i=new Image();i.crossOrigin='anonymous';i.onload=()=>res(i);i.onerror=rej;i.src=src;});}

fetch('templates.json').then(r=>r.json()).then(d=>{TPL=d.templates;renderGrid();}).catch(e=>{
  document.getElementById('grid').innerHTML='<div class="hint">Impossibile caricare templates.json. Apri la pagina via GitHub Pages o un server locale (non da file://).</div>';
});

function renderGrid(){
  const q=document.getElementById('q').value.toLowerCase();
  const g=document.getElementById('grid'); g.innerHTML='';
  TPL.filter(t=>t.name.includes(q)).forEach(t=>{
    const c=document.createElement('div'); c.className='card'+(sel&&sel.name===t.name?' sel':'');
    c.innerHTML=`<div class="thumbwrap"><img loading="lazy" src="${GREEN}${t.name}.png"></div>${t.name}`;
    c.onclick=()=>selectTpl(t); g.appendChild(c);
  });
}
document.getElementById('q').addEventListener('input',renderGrid);

async function selectTpl(t){ sel=t; sponsorImg=null; renderGrid(); renderMain(); }

function renderMain(){
  const t=sel; const h=t.hole;
  main.innerHTML=`
    <h2>${t.name}</h2>
    <div class="meta">Tela: <b>${t.w}×${t.h}px</b> · Buco (area sponsor): <b>${h[2]}×${h[3]}px</b>${t.layer0 ? " · <b>doppio layer</b> (sfondo dietro l'immagine)" : ""}</div>
    <div class="controls">
      <label class="btn">Carica immagine sponsor<input type="file" id="file" accept="image/*" hidden></label>
      <button class="btn primary" id="dl" disabled>Scarica mockup PNG</button>
    </div>
    <div class="stage"><canvas id="cv" width="${t.w}" height="${t.h}"></canvas></div>
    <div class="hint">Suggerimento: prepara l'immagine sponsor a <code>${h[2]}×${h[3]}px</code> per un incastro perfetto. Verrà comunque adattata al buco.</div>`;
  document.getElementById('file').addEventListener('change',onFile);
  document.getElementById('dl').addEventListener('click',download);
  draw();
}

async function onFile(e){
  const f=e.target.files[0]; if(!f) return;
  const url=URL.createObjectURL(f); sponsorImg=await loadImg(url);
  document.getElementById('dl').disabled=false; draw();
}

async function draw(){
  const t=sel, cv=document.getElementById('cv'), ctx=cv.getContext('2d');
  ctx.clearRect(0,0,t.w,t.h);
  if(t.layer0){ try{const l0=await loadImg(LAYER0+t.name+'.png'); ctx.drawImage(l0,0,0,t.w,t.h);}catch(e){} }
  if(sponsorImg){ const[hx,hy,hw,hh]=t.hole; ctx.drawImage(sponsorImg,hx,hy,hw,hh); }
  const ov=await loadImg(GREEN+t.name+'.png'); ctx.drawImage(ov,0,0,t.w,t.h);
}

function download(){
  const cv=document.getElementById('cv');
  cv.toBlob(b=>{const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=sel.name+'_mockup.png';a.click();});
}
</script>
</body>
</html>

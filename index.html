<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mockup Generator — FC Media Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,400,0,0" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=0.0.05">
</head>
<body>
<main class="app">
  <header class="topbar">
    <div class="brand">
      <a class="brand-mark" href="https://www.fantacalcio.it" target="_blank" rel="noreferrer" aria-label="FC Media Hub">
        <img src="fcmh-logo.png" alt="FC Media Hub">
      </a>
      <span>/</span><span>Mockup Generator</span>
    </div>
    <span class="version">v.0.0.05</span>
  </header>
  <section class="shell">
    <aside class="sidebar" aria-label="Elenco mockup">
      <div class="toolbar">
        <label class="search">
          <span class="material-symbols-rounded" aria-hidden="true">search</span>
          <input type="search" id="q" placeholder="Cerca mockup" autocomplete="off" aria-label="Cerca mockup">
        </label>
        <button class="view-btn active" id="gridView" type="button" aria-label="Vista griglia" aria-pressed="true"><span class="material-symbols-rounded">grid_view</span></button>
        <button class="view-btn" id="listView" type="button" aria-label="Vista elenco" aria-pressed="false"><span class="material-symbols-rounded">view_list</span></button>
      </div>
      <div class="grid" id="grid"></div>
    </aside>
    <section class="workspace">
      <div class="stage" id="stage">
        <div class="stage-placeholder" id="placeholder"><span class="material-symbols-rounded">image</span><div>Seleziona un mockup dalla lista</div></div>
        <img class="preview" id="preview" alt="Anteprima mockup selezionato">
        <canvas id="cv"></canvas>
        <div class="status" id="status" role="status"></div>
      </div>
      <footer class="footer">
        <button class="action examples" id="examplesBtn" type="button" disabled><span class="material-symbols-rounded">lightbulb</span>Esempi</button>
        <div class="actions">
          <label class="action upload"><span class="material-symbols-rounded">upload</span>Carica immagine<input type="file" id="file" accept="image/*" hidden></label>
          <button class="action save" id="dl" type="button" disabled><span class="material-symbols-rounded">download</span>Salva PNG</button>
        </div>
      </footer>
    </section>
  </section>
</main>
<div class="examples-overlay" id="examplesOverlay" aria-hidden="true">
  <section class="examples-dialog" role="dialog" aria-modal="true" aria-label="Esempi creativi">
    <button class="examples-close" id="examplesClose" type="button" aria-label="Chiudi esempi"><span class="material-symbols-rounded">close</span></button>
    <button class="carousel-arrow prev" id="examplesPrev" type="button" aria-label="Esempi precedenti"><span class="material-symbols-rounded">chevron_left</span></button>
    <div class="carousel-viewport">
      <div class="carousel-track" id="examplesTrack"></div>
    </div>
    <button class="carousel-arrow next" id="examplesNext" type="button" aria-label="Esempi successivi"><span class="material-symbols-rounded">chevron_right</span></button>
    <div class="carousel-meta"><div class="carousel-dots" id="examplesDots"></div><span id="examplesCounter"></span></div>
  </section>
</div>
<script>

};

  {category:'Lanner:Dooh',name:'Enilive',id:'10MnxteTaoNvVB7qnAVnLpeHLN3Hcwd-z'},
  {category:'Lanner:Dooh',name:'McDonald’s',id:'1pF8gcVZTE-2b01ARguFIOXSVWsoszvJj'},
  {category:'Lanner:Dooh',name:'Panini',id:'1rqqWLnVAv5gQyNiwe05Op9q-UV218jhc'},
  {category:'Live Domination',name:'McDonald’s',id:'1IoIXhC_SawZXLWmNlo69ZLx-Z7tvmf0h'},
  {category:'Live Domination',name:'Gillette',id:'1tmMayQ0d5y7of7MNRUcseihtL8z00v4d'},

  {category:'Live Domination',name:'Sisal Tipster',id:'1EEnOgnC3Vse21ok-tH10qwIOvAvIduuN'},
  {category:'Live Domination',name:'Sisal Fun Club',id:'1WJlKydOyXrkd1PpuaBMd4iIrVzh5hyIf'},
  {category:'Home Widget Probabili',name:'Vita da Carlo Mobile',id:'1j9YjarO87KcVJ5vlLLHBu0-zC-wXLTl1'},
  {category:'Home Widget Probabili',name:'Vita da Carlo Desktop',id:'1sXfKmmWc6xddYGKhAOulHc7c7sx0Cbge'},
  {category:'Home Widget Probabili',name:'Enilive Mobile',id:'1A_bdFQgI1ct_mYK1uWrv-hT39LAplLqH'},
  {category:'Home Widget Probabili',name:'Enilive Desktop',id:'11_CGrsaxD_gM_cHbWG8TJMlBzbOZpPnA'},
  {category:'Home Widget Probabili',name:'Bancomat Mobile',id:'1vdpYzwT7pIB38BoXgClV5PwQTKVJbpCq'},
  {category:'Home Widget Probabili',name:'Bancomat Desktop',id:'1fqkRcKGsVWRhcGdyCubdRX8VaElst3da'},
  {category:'Chat Msg',name:'Telepass',id:'1WgPwSe3bKcKbtUafLQK4-WjSWNt4rxsz'},
  {category:'Chat Msg',name:'Panini',id:'1KSJ4XvD6p-DZQozoW66tNaLDP0QRC4iZ'},
  {category:'Chat Msg',name:'Unipol',id:'15dXPqZ_zkG8R9sWMuJCv1IxolasxbyWH'},
  {category:'Mercato',name:'eBay Popup',id:'1OXdRJoku5l8T36Y-eZ3Z_2KT6nKa7Abn'},

  {category:'Mercato',name:'eBay Market Hub 01',id:'1jHX3KY6bABTjPWUNZa4GysGdkTP-hGIu'},

  {category:'Led Bordocampo - Inserimento formazione',name:'Squid Game 02',id:'1mrDgirUrAv-kihgy0qIGsqwAHCoBSksG'},
  {category:'Led Bordocampo - Inserimento formazione',name:'Squid Game 01',id:'1lprvcb6HUoEI9hgoI93fSLsX50s-w2yh'},
  {category:'Led Bordocampo - Inserimento formazione',name:'Captain America',id:'1Da5p7QjmIWC4kRu_9IdpgEdPTJcGPxE_'},
  {category:'Led Bordocampo - Inserimento formazione',name:'Tempocasa',id:'11BIU8UrIH1BZckVFO9jiwAiTFZ45oKH9'},
  {category:'Led Bordocampo - Inserimento formazione',name:'Loki',id:'1_GnLDCaiY6kac-M_JXd4uCjQbA0SKHAr'},
  {category:'Sala Stampa',name:'Sala Stampa Banner',id:'1Oq3zikPcddt_ITq1KAeqsVMo6l201Jn4'},
  {category:'Sala Stampa',name:'Sala Stampa Dashboard',id:'1oDLWCPlpwsk85GXHrJsIT8_Bly_aqvOM'},
  {category:'Sala Stampa',name:'Sala Stampa Header',id:'1XH_3xCrmb-NuS2Lilfof66jDn0csTBXe'},
  {category:'Sala Stampa',name:'Sala Stampa Dashboard JPG',id:'1ltODU4bvmtS73fx5IaX7kU4Reg4h0K6a'},
  {category:'Sala Stampa',name:'Sala Stampa Header JPG',id:'1LVYna-NnQVyiybT6D9KQnu76NuE9TGJL'},
  {category:'Sala Stampa',name:'Sala Stampa Banner JPG',id:'1RBcSMVb_eRpzZcPmwkvq1xiGqtedsg6A'},
  {category:'Classifica',name:'Disney 01',id:'1Emd_JkB4DyTy1_g3agOFAB2ENXFJvJuF'},
  {category:'Classifica',name:'Disney 02',id:'1AL9R92jP5rS9e2Fk1mMppwo4bGF9uzs7'}
];
let TPL=[],sel=null,sponsorImg=null,layout='grid',examplesIndex=0,examplesOpen=false;
const grid=document.getElementById('grid'),preview=document.getElementById('preview'),canvas=document.getElementById('cv'),placeholder=document.getElementById('placeholder'),downloadBtn=document.getElementById('dl');
const previewUrl=(name,size=600)=>PREVIEWS[name]?`${DRIVE}${PREVIEWS[name]}=w${size}`:GREEN+name+'.png';
const label=name=>name.split('-').map(word=>word.charAt(0).toUpperCase()+word.slice(1)).join(' ');
function loadImg(src){return new Promise((resolve,reject)=>{const img=new Image();img.crossOrigin='anonymous';img.onload=()=>resolve(img);img.onerror=reject;img.src=src;});}
function notify(message){const status=document.getElementById('status');status.textContent=message;status.classList.add('show');clearTimeout(notify.timer);notify.timer=setTimeout(()=>status.classList.remove('show'),2200);}
const examplesOverlay=document.getElementById('examplesOverlay'),examplesTrack=document.getElementById('examplesTrack'),examplesDots=document.getElementById('examplesDots'),examplesCounter=document.getElementById('examplesCounter');
const examplesButton=document.getElementById('examplesBtn'),examplesPrev=document.getElementById('examplesPrev'),examplesNext=document.getElementById('examplesNext');
const exampleUrl=id=>`${DRIVE}${id}=w1200`;
const examplesPerPage=()=>window.matchMedia('(max-width: 820px)').matches?1:3;
const EXAMPLE_CATEGORY_RULES=[
  [/^classifica$/,'Classifica'],[/^chat-/,'Chat Msg'],[/^dashboard-card/,'Card Dashboard'],[/^mercato-/,'Mercato'],[/^live-simulatore$/,'Simulatore'],[/^probabili-/,'Home Widget Probabili'],[/^sala-stampa-/,'Sala Stampa'],[/^inserimento-formazione-popup$/,'Popup - Inserimento formazione'],[/^inserimento-formazione-led$/,'Led Bordocampo - Inserimento formazione'],[/^live-/,'Live Domination']
];
const exampleCategoryFor=name=>EXAMPLE_CATEGORY_RULES.find(([pattern])=>pattern.test(name||''))?.[1]||null;
const relevantExamples=()=>{const category=exampleCategoryFor(sel?.name);return category?EXAMPLES.filter(item=>item.category===category):[];};
function updateExamplesButton(){
  const items=relevantExamples(),category=exampleCategoryFor(sel?.name);examplesButton.disabled=!items.length;examplesButton.title=items.length?`${items.length} esempi · ${category}`:'Nessun esempio disponibile per questo mockup';examplesButton.setAttribute('aria-label',examplesButton.title);
}
function renderExamples(){
  const items=relevantExamples(),perPage=examplesPerPage(),visibleCount=Math.min(perPage,Math.max(0,items.length-examplesIndex)),fragment=document.createDocumentFragment();examplesTrack.innerHTML='';
  for(let offset=0;offset<visibleCount;offset++){
    const item=items[examplesIndex+offset],slide=document.createElement('figure'),image=document.createElement('img'),caption=document.createElement('figcaption');
    slide.className='example-slide';image.src=exampleUrl(item.id);image.alt=`${item.category}: ${item.name}`;image.decoding='async';caption.className='example-caption';caption.textContent=`${item.category} · ${item.name}`;slide.append(image,caption);fragment.appendChild(slide);
  }
  examplesTrack.appendChild(fragment);
  const pageCount=Math.ceil(items.length/perPage),currentPage=Math.floor(examplesIndex/perPage),dotStart=Math.max(0,Math.min(currentPage-2,pageCount-5));examplesDots.innerHTML='';
  for(let page=dotStart;page<Math.min(dotStart+5,pageCount);page++){
    const dot=document.createElement('button');dot.type='button';dot.className='carousel-dot'+(page===currentPage?' active':'');dot.setAttribute('aria-label',`Vai alla pagina ${page+1}`);if(page===currentPage)dot.setAttribute('aria-current','true');dot.addEventListener('click',()=>{examplesIndex=page*perPage;renderExamples();});examplesDots.appendChild(dot);
  }
  const first=examplesIndex+1,last=Math.min(examplesIndex+perPage,items.length);examplesCounter.textContent=items.length===1?'1 esempio':`${first}–${last} di ${items.length}`;examplesPrev.disabled=examplesNext.disabled=items.length<=perPage;
}
function moveExamples(direction){const items=relevantExamples(),step=examplesPerPage(),pageCount=Math.ceil(items.length/step);if(pageCount<=1)return;const nextPage=(Math.floor(examplesIndex/step)+direction+pageCount)%pageCount;examplesIndex=nextPage*step;renderExamples();}
function openExamples(){if(!relevantExamples().length)return;examplesIndex=0;examplesOpen=true;examplesOverlay.classList.add('open');examplesOverlay.setAttribute('aria-hidden','false');document.body.classList.add('modal-open');renderExamples();document.getElementById('examplesClose').focus();}
function closeExamples(){examplesOpen=false;examplesOverlay.classList.remove('open');examplesOverlay.setAttribute('aria-hidden','true');document.body.classList.remove('modal-open');document.getElementById('examplesBtn').focus();}
function renderGrid(){
  const query=document.getElementById('q').value.trim().toLowerCase();
  const items=TPL.filter(t=>t.name.toLowerCase().includes(query)||label(t.name).toLowerCase().includes(query));
  grid.innerHTML='';grid.classList.toggle('list',layout==='list');
  if(!items.length){grid.innerHTML='<div class="empty-list">Nessun mockup trovato.</div>';return;}
  const fragment=document.createDocumentFragment();
  items.forEach(t=>{
    const card=document.createElement('button');card.type='button';card.className='card'+(sel?.name===t.name?' selected':'');card.dataset.name=t.name;card.setAttribute('aria-label',`Apri ${label(t.name)}`);card.innerHTML=`<span class="thumb"><img loading="lazy" src="${previewUrl(t.name,240)}" alt=""></span><span class="card-name">${label(t.name)}</span>`;card.addEventListener('click',()=>selectTpl(t));fragment.appendChild(card);
  });grid.appendChild(fragment);
}
function setLayout(next){layout=next;document.getElementById('gridView').classList.toggle('active',next==='grid');document.getElementById('listView').classList.toggle('active',next==='list');document.getElementById('gridView').setAttribute('aria-pressed',next==='grid');document.getElementById('listView').setAttribute('aria-pressed',next==='list');renderGrid();}
function selectTpl(t){
  sel=t;sponsorImg=null;downloadBtn.disabled=true;canvas.classList.remove('visible');preview.src=previewUrl(t.name,900);preview.alt=`Anteprima ${label(t.name)}`;preview.classList.add('visible');placeholder.hidden=true;updateExamplesButton();renderGrid();
}
async function onFile(event){
  const file=event.target.files[0];if(!file||!sel)return;
  try{const url=URL.createObjectURL(file);sponsorImg=await loadImg(url);URL.revokeObjectURL(url);await draw();preview.classList.remove('visible');canvas.classList.add('visible');downloadBtn.disabled=false;notify('Immagine caricata');}catch(error){notify('Impossibile caricare l’immagine');}
}
async function draw(){
  const t=sel,ctx=canvas.getContext('2d');canvas.width=t.w;canvas.height=t.h;ctx.clearRect(0,0,t.w,t.h);
  if(t.layer0){try{const background=await loadImg(LAYER0+t.name+'.png');ctx.drawImage(background,0,0,t.w,t.h);}catch(error){}}
  if(sponsorImg){const [x,y,w,h]=t.hole;ctx.drawImage(sponsorImg,x,y,w,h);}
  const overlay=await loadImg(GREEN+t.name+'.png');ctx.drawImage(overlay,0,0,t.w,t.h);
}
function download(){
  if(!sel||!sponsorImg)return;canvas.toBlob(blob=>{if(!blob)return;const link=document.createElement('a'),url=URL.createObjectURL(blob);link.href=url;link.download=sel.name+'_mockup.png';link.click();setTimeout(()=>URL.revokeObjectURL(url),1000);},'image/png');
}
document.getElementById('q').addEventListener('input',renderGrid);
document.getElementById('gridView').addEventListener('click',()=>setLayout('grid'));
document.getElementById('listView').addEventListener('click',()=>setLayout('list'));
document.getElementById('file').addEventListener('change',onFile);
downloadBtn.addEventListener('click',download);
examplesButton.addEventListener('click',openExamples);
document.getElementById('examplesClose').addEventListener('click',closeExamples);
document.getElementById('examplesPrev').addEventListener('click',()=>moveExamples(-1));
document.getElementById('examplesNext').addEventListener('click',()=>moveExamples(1));
examplesOverlay.addEventListener('click',event=>{if(event.target===examplesOverlay)closeExamples();});
document.addEventListener('keydown',event=>{if(!examplesOpen)return;if(event.key==='Escape')closeExamples();if(event.key==='ArrowLeft')moveExamples(-1);if(event.key==='ArrowRight')moveExamples(1);});
window.addEventListener('resize',()=>{if(examplesOpen)renderExamples();});
fetch('templates.json').then(response=>{if(!response.ok)throw new Error('templates.json');return response.json();}).then(data=>{TPL=data.templates;renderGrid();if(TPL.length)selectTpl(TPL.find(t=>t.name==='sala-stampa-dashboard')||TPL[0]);}).catch(()=>{grid.innerHTML='<div class="empty-list">Impossibile caricare i template.</div>';});
</script>
</body>
</html>

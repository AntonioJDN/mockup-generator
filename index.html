<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mockup Generator — FC Media Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,400,0,0" rel="stylesheet">
<style>
:root{
  color-scheme:light;
  --navy:#020034;
  --surface:#fcfcff;
  --surface-2:#e8effb;
  --on-surface:#001e30;
  --primary:#0256d1;
  --primary-container:#dae2ff;
  --secondary:#6300ff;
  --secondary-container:#e9ddff;
  --outline:#bdc7da;
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  min-width:320px;
  background:var(--navy);
  color:var(--on-surface);
  font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  overflow:hidden;
}
body::before,body::after{
  content:"";
  position:fixed;
  inset:auto;
  pointer-events:none;
  opacity:.55;
  transform:rotate(32deg);
}
body::before{width:760px;height:110px;left:-160px;top:12px;background:#111365}
body::after{width:900px;height:140px;right:-180px;bottom:-40px;background:#10115e}
button,input{font:inherit}
button{border:0}
.material-symbols-rounded{font-size:28px;line-height:1;font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 28}
.app{height:100%;padding:8px;display:flex;flex-direction:column;position:relative;z-index:1}
.topbar{height:96px;padding:20px 30px;display:flex;align-items:center;justify-content:space-between;color:#fff;flex:none}
.brand{display:flex;align-items:center;gap:20px;font-size:20px}
.brand-mark{width:104px;height:60px;display:flex;align-items:center;gap:8px;color:#fff;text-decoration:none}
.brand-disc{width:48px;height:48px;border-radius:14px;background:#123cff;display:grid;place-items:center;font-weight:800;font-size:24px;box-shadow:0 8px 24px #0004}
.brand-words{font-size:9px;font-weight:700;line-height:1.15;letter-spacing:1.1px}
.version{font-size:14px}
.shell{min-height:0;flex:1;display:flex;background:var(--surface);border-radius:40px;overflow:hidden}
.sidebar{width:466px;flex:none;padding:16px;display:flex;flex-direction:column;gap:10px;background:var(--surface);border-right:2px solid var(--surface-2)}
.toolbar{display:flex;gap:10px;flex:none}
.search{height:48px;min-width:0;flex:1;display:flex;align-items:center;gap:10px;padding:0 16px;border-radius:30px;background:var(--surface-2)}
.search input{width:100%;min-width:0;border:0;outline:0;background:transparent;color:var(--on-surface);font-size:16px}
.search input::placeholder{color:var(--on-surface);opacity:.78}
.view-btn{width:48px;height:48px;flex:none;border-radius:50%;display:grid;place-items:center;background:var(--surface-2);color:var(--on-surface);cursor:pointer;transition:.18s ease}
.view-btn:hover{transform:translateY(-1px)}
.view-btn.active{background:var(--primary-container);color:var(--primary)}
.grid{min-height:0;flex:1;overflow:auto;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));align-content:start;gap:10px;padding-right:3px;scrollbar-width:thin}
.grid.list{grid-template-columns:1fr}
.card{min-width:0;padding:4px;border:2px solid transparent;border-radius:30px;background:var(--surface-2);color:#000;cursor:pointer;overflow:hidden;display:flex;flex-direction:column;align-items:center;transition:border-color .18s,background .18s,transform .18s}
.card:hover{transform:translateY(-2px)}
.card.selected{border-color:var(--primary);background:var(--primary-container)}
.thumb{height:180px;width:100%;display:grid;place-items:center;overflow:hidden;border-radius:26px 26px 20px 20px;background:linear-gradient(145deg,#fff9,#dbe5f5)}
.thumb img{width:100%;height:100%;object-fit:contain;display:block}
.card-name{width:100%;padding:8px 5px 9px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center;font-size:15px;font-weight:500;text-transform:capitalize}
.grid.list .card{height:108px;display:grid;grid-template-columns:92px minmax(0,1fr);padding:4px 14px 4px 4px}
.grid.list .thumb{height:96px;border-radius:26px}
.grid.list .card-name{text-align:left;padding-left:16px;font-size:16px}
.empty-list{grid-column:1/-1;padding:40px 20px;color:#59677b;text-align:center}
.workspace{min-width:0;flex:1;padding:20px 40px;display:flex;flex-direction:column;gap:20px;align-items:center;justify-content:center}
.stage{min-height:0;flex:1;width:100%;display:flex;align-items:center;justify-content:center;overflow:hidden;border-radius:60px;position:relative;background:#fafbff}
.stage-placeholder{text-align:center;color:#6a778c;padding:30px}
.stage-placeholder .material-symbols-rounded{font-size:54px;color:var(--primary);margin-bottom:10px}
.preview,.stage canvas{display:none;max-width:100%;max-height:100%;width:auto;height:auto;object-fit:contain;filter:drop-shadow(0 8px 15px #0004)}
.preview.visible,.stage canvas.visible{display:block}
.footer{width:100%;display:flex;align-items:center;justify-content:space-between;gap:18px;flex:none}
.actions{display:flex;align-items:center;gap:10px}
.action{height:60px;padding:0 16px;border-radius:20px;display:flex;align-items:center;justify-content:center;gap:10px;font-weight:500;font-size:16px;cursor:pointer;text-decoration:none;white-space:nowrap;transition:filter .18s,transform .18s}
.action:hover{filter:brightness(.98);transform:translateY(-1px)}
.action.examples{background:var(--secondary-container);color:var(--secondary)}
.action.upload{width:240px;background:var(--surface-2);color:var(--on-surface)}
.action.save{width:240px;background:var(--primary);color:#fff}
.action:disabled{opacity:.45;cursor:not-allowed;transform:none}
.status{position:absolute;inset:16px 16px auto auto;padding:8px 12px;border-radius:12px;background:#001e30d9;color:#fff;font-size:12px;opacity:0;transform:translateY(-5px);transition:.2s;pointer-events:none}
.status.show{opacity:1;transform:none}
@media(max-width:1050px){
  .sidebar{width:390px}.thumb{height:150px}.action.upload,.action.save{width:auto;min-width:180px}
}
@media(max-width:820px){
  body{overflow:auto}.app{height:auto;min-height:100%}.topbar{height:80px;padding:14px 16px}.brand-mark{width:auto}.brand-words{display:none}.version{font-size:12px}
  .shell{min-height:calc(100vh - 96px);flex-direction:column;border-radius:28px}.sidebar{width:100%;height:420px;border-right:0;border-bottom:2px solid var(--surface-2);border-radius:28px 28px 0 0}.grid{grid-template-columns:repeat(2,minmax(0,1fr))}.workspace{min-height:620px;padding:20px}.stage{border-radius:32px}.footer{align-items:stretch;flex-direction:column}.actions{display:grid;grid-template-columns:1fr 1fr}.action.examples,.action.upload,.action.save{width:100%}
}
@media(max-width:480px){
  .topbar{padding-inline:8px}.brand{gap:9px;font-size:15px}.brand-disc{width:42px;height:42px}.sidebar{height:390px;padding:12px}.thumb{height:130px}.card-name{font-size:12px}.workspace{min-height:540px;padding:14px}.actions{grid-template-columns:1fr}.action{height:54px}
}
</style>
</head>
<body>
<main class="app">
  <header class="topbar">
    <div class="brand">
      <a class="brand-mark" href="https://www.fantacalcio.it" target="_blank" rel="noreferrer" aria-label="FC Media Hub">
        <span class="brand-disc">C</span><span class="brand-words">MEDIA<br>HUB</span>
      </a>
      <span>/</span><span>Mockup Generator</span>
    </div>
    <span class="version">v.0.0.02</span>
  </header>
  <section class="shell">
    <aside class="sidebar" aria-label="Elenco mockup">
      <div class="toolbar">
        <label class="search">
          <span class="material-symbols-rounded" aria-hidden="true">search</span>
          <input type="search" id="q" placeholder="Cerca mockup" autocomplete="off" aria-label="Cerca mockup">
        </label>
        <button class="view-btn active" id="gridView" type="button" aria-label="Vista griglia" aria-pressed="true"><span class="material-symbols-rounded">grid_view</span></button>
        <button class="view-btn" id="listView" type="button" aria-label="Vista elenco" aria-pressed="false"><span class="material-symbols-rounded">view_list</span></button>
      </div>
      <div class="grid" id="grid"></div>
    </aside>
    <section class="workspace">
      <div class="stage" id="stage">
        <div class="stage-placeholder" id="placeholder"><span class="material-symbols-rounded">image</span><div>Seleziona un mockup dalla lista</div></div>
        <img class="preview" id="preview" alt="Anteprima mockup selezionato">
        <canvas id="cv"></canvas>
        <div class="status" id="status" role="status"></div>
      </div>
      <footer class="footer">
        <a class="action examples" href="https://drive.google.com/drive/folders/1gYIlH0IzYvyXhO8IX26-dEVNIpHT2qIW" target="_blank" rel="noreferrer"><span class="material-symbols-rounded">lightbulb</span>Esempi</a>
        <div class="actions">
          <label class="action upload"><span class="material-symbols-rounded">upload</span>Carica immagine<input type="file" id="file" accept="image/*" hidden></label>
          <button class="action save" id="dl" type="button" disabled><span class="material-symbols-rounded">download</span>Salva PNG</button>
        </div>
      </footer>
    </section>
  </section>
</main>
<script>
const GREEN='templates/green/', LAYER0='templates/layer0/';
const DRIVE='https://lh3.googleusercontent.com/d/';
const PREVIEWS={
  'chat-img':'1Osim-VlJZBZgAnK9jz3J2fPuX0fgmu2c','chat-msg':'17C4VkCm7DAtRmatAWxFa8ICbzzJp7SWg','classifica':'1nrxPPO0LjGdhGoV4DrgM2P0qdKkf-GSe','clip-dark':'1O-ksjVgcLu-PwkBvlueFawXMTdIgfzRV','clip':'1-gMtdT0u3DGanqk5GIuqTIcHeqQAFHZK','dashboard-card-mobile':'1JbzO1wiPB2y-bUB4wgIj5Uf9KPkB8Apu','dashboard-card-tablet':'1jVcCpA-5UDv3k_N4qCFn952EBilxmHHY','fc-analyst-banner':'1cRqo9GgGqabUgAqQUZF7wX-QNVDi6fzi','fc-analyst-header-mobile':'1MsF1upQbf-vkET2wtEH6HrLv8rWhL4qb','fc-analyst-header-tablet':'1kr0goH5knI2WyTpC6kN383rcQYh51XK9','highlights-serie-a-dark':'1c61Np6tapD8kmh1as-dqEMPqAlAdcWPS','highlights-serie-a':'1GdWcHxzDSZuzihv60v2aZV4PEkDbfl52','inserimento-formazione-led':'1jReAg3muaNYGdD7xfqLAfD-M24w8d6To','inserimento-formazione-popup':'1c4DD0LMifJlnG2Oi14CLevZooJDgr8rD','live-double-mobile-bottom':'1Ug6uh73BlsxHk2ZyngKwvyZSHEAQe7JI','live-double-mobile-top':'1mHrPfJOjt4aWiwPt_Qs3RSONAR-OApPa','live-list-mobile':'1MlXobPClNW9l9nCpYnEpUB_40gsLsC1i','live-simulatore':'16biki4K3pG4bM-oejXAzi0GhQIMzrhRD','live-single-mobile':'1Clh_LcNfreDqHq817ufR1wv906B14g5k','live-tablet':'1KPL5CqRGtZqCoiiC2HZR0NEIQ3phYkIE','mercato-banner':'1ObXPlVRmfRYnzKF6LWLpq7YxZl4DaqW-','mercato-dettaglio-mobile':'1kJ8RXfqvXyA4DxnMgq6aL2d6TJ8CNKqD','mercato-lista-mobile':'1FPmWltY5a8frQXhYZ09I_c9HSFpdYuc4','mercato-popup':'1Fqlxxmu4MaKY41BBnZnAorkySUCM4WBX','mercato-tablet':'1CWKHOwv9IxKYnR-dfevEnqR3A9zQ9lWC','partecipanti-mobile':'1HjxLcBsc-VPBtdXsyIhBVuBV0xGNCUUw','partecipanti-tablet':'1Iy1qr946YWw2oCgkSiEybGI3qAzXPvkq','probabili-desktop':'1Ho47BunGgJEZTWIuYAAyLKP2sL406jYo','probabili-mobile':'1-Juvk_Jcjnc0VJm7p3xEgCaYiAqnENsI','sala-stampa-banner':'13LJDc2-tweZrhMUUfgxXNz8LENMGX81L','sala-stampa-dashboard':'1SdPw18w6xQnMAsQxvj2btohdIFRJ4LpY','sala-stampa-header':'1Fp19zDHCKIuOBUab-HcjyhmfTTMNaRCi','video-header-mobile':'1Wo0cEnHyGB5fKfiVEM6YcxCMUlMhXi3n','video-header-tablet':'1WNd0XWO4TH2FNa3tbnSB0b6i6veC9PzL'
};
let TPL=[],sel=null,sponsorImg=null,layout='grid';
const grid=document.getElementById('grid'),preview=document.getElementById('preview'),canvas=document.getElementById('cv'),placeholder=document.getElementById('placeholder'),downloadBtn=document.getElementById('dl');
const previewUrl=name=>PREVIEWS[name]?`${DRIVE}${PREVIEWS[name]}=w600`:GREEN+name+'.png';
const label=name=>name.split('-').map(word=>word.charAt(0).toUpperCase()+word.slice(1)).join(' ');
function loadImg(src){return new Promise((resolve,reject)=>{const img=new Image();img.crossOrigin='anonymous';img.onload=()=>resolve(img);img.onerror=reject;img.src=src;});}
function notify(message){const status=document.getElementById('status');status.textContent=message;status.classList.add('show');clearTimeout(notify.timer);notify.timer=setTimeout(()=>status.classList.remove('show'),2200);}
function renderGrid(){
  const query=document.getElementById('q').value.trim().toLowerCase();
  const items=TPL.filter(t=>t.name.toLowerCase().includes(query)||label(t.name).toLowerCase().includes(query));
  grid.innerHTML='';grid.classList.toggle('list',layout==='list');
  if(!items.length){grid.innerHTML='<div class="empty-list">Nessun mockup trovato.</div>';return;}
  const fragment=document.createDocumentFragment();
  items.forEach(t=>{
    const card=document.createElement('button');card.type='button';card.className='card'+(sel?.name===t.name?' selected':'');card.dataset.name=t.name;card.setAttribute('aria-label',`Apri ${label(t.name)}`);card.innerHTML=`<span class="thumb"><img loading="lazy" src="${previewUrl(t.name)}" alt=""></span><span class="card-name">${label(t.name)}</span>`;card.addEventListener('click',()=>selectTpl(t));fragment.appendChild(card);
  });grid.appendChild(fragment);
}
function setLayout(next){layout=next;document.getElementById('gridView').classList.toggle('active',next==='grid');document.getElementById('listView').classList.toggle('active',next==='list');document.getElementById('gridView').setAttribute('aria-pressed',next==='grid');document.getElementById('listView').setAttribute('aria-pressed',next==='list');renderGrid();}
function selectTpl(t){
  sel=t;sponsorImg=null;downloadBtn.disabled=true;canvas.classList.remove('visible');preview.src=previewUrl(t.name);preview.alt=`Anteprima ${label(t.name)}`;preview.classList.add('visible');placeholder.hidden=true;renderGrid();
}
async function onFile(event){
  const file=event.target.files[0];if(!file||!sel)return;
  try{const url=URL.createObjectURL(file);sponsorImg=await loadImg(url);URL.revokeObjectURL(url);await draw();preview.classList.remove('visible');canvas.classList.add('visible');downloadBtn.disabled=false;notify('Immagine caricata');}catch(error){notify('Impossibile caricare l’immagine');}
}
async function draw(){
  const t=sel,ctx=canvas.getContext('2d');canvas.width=t.w;canvas.height=t.h;ctx.clearRect(0,0,t.w,t.h);
  if(t.layer0){try{const background=await loadImg(LAYER0+t.name+'.png');ctx.drawImage(background,0,0,t.w,t.h);}catch(error){}}
  if(sponsorImg){const [x,y,w,h]=t.hole;ctx.drawImage(sponsorImg,x,y,w,h);}
  const overlay=await loadImg(GREEN+t.name+'.png');ctx.drawImage(overlay,0,0,t.w,t.h);
}
function download(){
  if(!sel||!sponsorImg)return;canvas.toBlob(blob=>{if(!blob)return;const link=document.createElement('a'),url=URL.createObjectURL(blob);link.href=url;link.download=sel.name+'_mockup.png';link.click();setTimeout(()=>URL.revokeObjectURL(url),1000);},'image/png');
}
document.getElementById('q').addEventListener('input',renderGrid);
document.getElementById('gridView').addEventListener('click',()=>setLayout('grid'));
document.getElementById('listView').addEventListener('click',()=>setLayout('list'));
document.getElementById('file').addEventListener('change',onFile);
downloadBtn.addEventListener('click',download);
fetch('templates.json').then(response=>{if(!response.ok)throw new Error('templates.json');return response.json();}).then(data=>{TPL=data.templates;renderGrid();if(TPL.length)selectTpl(TPL.find(t=>t.name==='sala-stampa-dashboard')||TPL[0]);}).catch(()=>{grid.innerHTML='<div class="empty-list">Impossibile caricare i template.</div>';});
</script>
</body>
</html>
